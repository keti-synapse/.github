<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SYNAPSE mark">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A2236"/>
      <stop offset="1" stop-color="#0E3354"/>
    </linearGradient>
    <linearGradient id="mlink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BC2E7"/>
      <stop offset="1" stop-color="#8FE0FF"/>
    </linearGradient>
    <filter id="msoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="240" height="240" rx="48" fill="url(#mbg)"/>

  <!-- edges -->
  <g stroke="#3A6A93" stroke-width="2" opacity="0.6" stroke-linecap="round">
    <line x1="120" y1="120" x2="120" y2="56"/>
    <line x1="120" y1="120" x2="176" y2="92"/>
    <line x1="120" y1="120" x2="176" y2="156"/>
    <line x1="120" y1="120" x2="64" y2="156"/>
    <line x1="120" y1="120" x2="64" y2="92"/>
  </g>
  <!-- highlighted P2P link -->
  <path d="M176 92 Q210 124 176 156" fill="none" stroke="url(#mlink)" stroke-width="3.5" filter="url(#msoft)"/>

  <!-- satellite nodes -->
  <g fill="#0E3A66" stroke="#5BC2E7" stroke-width="2.5">
    <circle cx="120" cy="56"  r="11"/>
    <circle cx="176" cy="92"  r="11"/>
    <circle cx="176" cy="156" r="11"/>
    <circle cx="64"  cy="156" r="11"/>
    <circle cx="64"  cy="92"  r="11"/>
  </g>

  <!-- hub -->
  <circle cx="120" cy="120" r="20" fill="#00529B" stroke="#5BC2E7" stroke-width="3"/>
  <circle cx="120" cy="120" r="7.5" fill="#EAF8FF"/>
</svg>
